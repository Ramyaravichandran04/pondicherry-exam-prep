<!DOCTYPE html>
<html>
<head>
<title>Reasoning Quiz 1</title>
<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
}
.question {
    margin-bottom: 20px;
}
.timer {
    font-size: 20px;
    font-weight: bold;
    color: red;
}
button {
    padding: 10px 15px;
    margin-top: 10px;
}
.answerResult {
    margin-top: 10px;
    padding: 10px;
    background: #f9f9f9;
    border-left: 4px solid #007bff;
}
</style>
</head>
<body>

<h2>Reasoning Quiz 1</h2>
<div class="timer">Time Left: <span id="time"></span> seconds</div>

<form id="quizForm"></form>

<button type="button" onclick="submitQuiz()">Submit</button>

<h3 id="result"></h3>

<script>

const questions = [

{
question: `1. Find the odd word from the given alternatives.<br><br>
(A) Flower<br>
(B) Herb<br>
(C) Tree<br>
(D) Shrub`,
options: [
"Flower",
"Herb",
"Tree",
"Shrub"
],
answer: 0,
explanation: `Herb, Tree, and Shrub are types of plants. Flower is a part of a plant, not a plant category.`
},

{
question: `2. Find the odd letters from the given alternatives.<br><br>
(A) NOPQ<br>
(B) JKLM<br>
(C) RSTU<br>
(D) VWXZ`,
options: [
"NOPQ",
"JKLM",
"RSTU",
"VWXZ"
],
answer: 3,
explanation: `NOPQ, JKLM, and RSTU are four consecutive letters. In VWXZ, Y is missing, so it is not consecutive.`
},

{
question: `3. Find the odd number pair from the given alternatives.<br><br>
(A) (34, 85)<br>
(B) (85, 136)<br>
(C) (102, 153)<br>
(D) (63, 162)`,
options: [
"(34, 85)",
"(85, 136)",
"(102, 153)",
"(63, 162)"
],
answer: 3,
explanation: `In (A), (B), and (C): second number = first number + 51.<br>
34+51=85, 85+51=136, 102+51=153.<br>
But 63+51=114 (not 162).`
},

{
question: `4. If HOUSE is written as FQSUC, then how is CHAIR written in that code?`,
options: [
"SBJID",
"DIBJS",
"SHBGD",
"AJYKP"
],
answer: 0,
explanation: `The code reverses the word and shifts letters. Using the same pattern, CHAIR becomes SBJID.`
},

{
question: `5. If P denotes ÷, Q denotes ×, R denotes + and S denotes −, find the value of:<br>
18 Q 12 P 4 R 5 S 6`,
options: [
"53",
"64",
"81",
"24"
],
answer: 0,
explanation: `18×12=216, 216÷4=54, 54+5=59, 59−6=53.`
},

{
question: `6. If 4 + 3 = 25 and 8 + 4 = 80, then 3 + 2 = ?`,
options: [
"10",
"15",
"13",
"12"
],
answer: 2,
explanation: `Rule is sum of squares: 3² + 2² = 9 + 4 = 13.`
},

{
question: `7. Psychology : Human Being :: Ornithology : ?`,
options: [
"Volcanoes",
"Birds",
"Insects",
"Reptiles"
],
answer: 1,
explanation: `Psychology studies human beings. Ornithology studies birds.`
},

{
question: `8. EGIK : FHJL :: MOQS : ?`,
options: [
"NPRT",
"LNOQ",
"KMOQ",
"NRPT"
],
answer: 0,
explanation: `Each letter increases by +1.`
},

{
question: `9. 147 : 741 :: 869 : ?`,
options: [
"968",
"896",
"689",
"986"
],
answer: 0,
explanation: `Reverse digits → 968.`
},

{
question: `10. Missing number:<br>
8 32 4<br>
7 ? 5<br>
2 6 3`,
options: [
"35",
"30",
"20",
"25"
],
answer: 0,
explanation: `Middle = Left × Right (7×5 = 35).`
},

{
question: `11. Direction after North → right → right`,
options: [
"West",
"South",
"East",
"North"
],
answer: 1,
explanation: `North → East → South.`
},

{
question: `12. Relationship: Birds, Parrots, Bats`,
options: [
"Diagram A",
"Diagram B",
"Diagram C",
"Diagram D"
],
answer: 2,
explanation: `Parrots inside Birds; Bats separate.`
},

{
question: `13. Complete the series: sr_tr_srs_r_srst_`,
options: [
"tsrtsr",
"ttssrr",
"strtrs",
"tstttr"
],
answer: 0,
explanation: `Repeating pattern s, r, t.`
},

{
question: `14. Series: 43, 172, 86, 344, ?`,
options: [
"258",
"172",
"129",
"430"
],
answer: 1,
explanation: `×4, ÷2 pattern → next is 172.`
},

{
question: `15. Cannot be formed from CHRONOLOGICAL`,
options: [
"LOGIC",
"CALL",
"CALICO",
"ANALOGY"
],
answer: 3,
explanation: `Letter Y is not present.`
}

];

let form = document.getElementById("quizForm");
let resultBox = document.getElementById("result");
let timerDisplay = document.getElementById("time");

let timerInterval;
let totalTime = 12 * 60;
let timeLeft = totalTime;

window.onload = function() {
    loadQuestions();
    startTimer();
};

function loadQuestions(){
    form.innerHTML = "";
    questions.forEach((q, index) => {
        let div = document.createElement("div");
        div.classList.add("question");
        div.innerHTML = `<p>${q.question}</p>`;
        q.options.forEach((option, i) => {
            div.innerHTML += `
            <label>
                <input type="radio" name="q${index}" value="${i}">
                ${option}
            </label><br>`;
        });
        form.appendChild(div);
    });
}
let totalTime = 12 * 60; // 12 minutes
let timeLeft = totalTime;

function startTimer(){
    updateTimerDisplay();
    timerInterval = setInterval(()=>{
        timeLeft--;
        updateTimerDisplay();
        if(timeLeft <= 0){
            clearInterval(timerInterval);
            submitQuiz();
        }
    },1000);
}

function updateTimerDisplay(){
    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;
    timerDisplay.innerText = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
}


function submitQuiz(){

    clearInterval(timerInterval);

    let score = 0;
    let correctCount = 0;
    let wrongCount = 0;
    let notAnsweredCount = 0;

    questions.forEach((q, index) => {

        let selected = document.querySelector(`input[name="q${index}"]:checked`);
        let selectedValue = selected ? parseInt(selected.value) : null;

        let questionDiv = document.getElementsByClassName("question")[index];
        let oldResult = questionDiv.querySelector(".answerResult");
        if(oldResult) oldResult.remove();

        let resultText = document.createElement("div");
        resultText.classList.add("answerResult");

        if(selectedValue === null){
            notAnsweredCount++;
            resultText.innerHTML = `
                <p style="color:orange;"><b>Not Answered</b></p>
                <p><b>Correct Answer:</b> ${q.options[q.answer]}</p>
                <p><b>Explanation:</b> ${q.explanation}</p>
            `;
        }
        else if(selectedValue === q.answer){
            score += 1;
            correctCount++;
            resultText.innerHTML = `
                <p style="color:green;"><b>✔ Correct (+1)</b></p>
                <p><b>Explanation:</b> ${q.explanation}</p>
            `;
        }
        else{
            wrongCount++;
            resultText.innerHTML = `
                <p style="color:red;"><b>✘ Wrong</b></p>
                <p><b>Correct Answer:</b> ${q.options[q.answer]}</p>
                <p><b>Explanation:</b> ${q.explanation}</p>
            `;
        }

        questionDiv.appendChild(resultText);
    });

    resultBox.innerHTML = `
        <div style="background:#f0f0f0; padding:15px; margin-bottom:20px;">
            <h3>Final Score: ${score} / ${questions.length}</h3>
            <p>✔ Correct: ${correctCount}</p>
            <p>✘ Wrong: ${wrongCount}</p>
            <p>⭕ Not Answered: ${notAnsweredCount}</p>
        </div>
    `;
}

</script>
</body>
</html>
