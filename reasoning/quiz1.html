<!DOCTYPE html>
<html>
<head>
<title>Reasoning Quiz 1 - Timed</title>
<style>
body {
    font-family: Arial;
    padding: 20px;
}

.question {
    margin-bottom: 20px;
}

.result {
    margin-top: 5px;
    font-weight: bold;
}

#timer {
    font-size: 20px;
    font-weight: bold;
    color: red;
}
</style>
</head>

<body>

<h2>Reasoning Quiz 1</h2>

<div id="timer">Time Left: --</div>

<div id="quiz"></div>

<button onclick="submitTest()">Submit Test</button>

<div id="score"></div>
<div id="answers"></div>

<script>
const questions = [
{
q: "1. Find the odd word from the given alternatives.\n\n(A) Flower\n(B) Herb\n(C) Tree\n(D) Shrub",
answer: "A",
explanation: "Herb, Tree, and Shrub are types of plants. Flower is a part of a plant, not a plant category."
},

{
q: "2. Find the odd letters from the given alternatives.\n\n(A) NOPQ\n(B) JKLM\n(C) RSTU\n(D) VWXZ",
answer: "D",
explanation: "NOPQ, JKLM, and RSTU are four consecutive letters. In VWXZ, Y is missing, so it is not consecutive."
},

{
q: "3. Find the odd number pair from the given alternatives.\n\n(A) (34, 85)\n(B) (85, 136)\n(C) (102, 153)\n(D) (63, 162)",
answer: "D",
explanation: "Second number = First number + 51 in A, B, C. For (63,162), 63+51=114 (not 162)."
},

{
q: "4. If HOUSE is written as FQSUC, then how is CHAIR written in that code?\n\n(A) SBJID\n(B) DIBJS\n(C) SHBGD\n(D) AJYKP",
answer: "A",
explanation: "The code reverses the word and shifts letters."
},

{
q: "5. If P denotes ÷, Q denotes ×, R denotes + and S denotes −, find the value of: 18 Q 12 P 4 R 5 S 6\n\n(A) 53\n(B) 64\n(C) 81\n(D) 24",
answer: "A",
explanation: "18×12=216, 216÷4=54, 54+5=59, 59−6=53."
},

{
q: "6. If 4 + 3 = 25 and 8 + 4 = 80, then 3 + 2 = ?\n\n(A) 10\n(B) 15\n(C) 13\n(D) 12",
answer: "C",
explanation: "Rule is sum of squares: 3² + 2² = 9 + 4 = 13."
},

{
q: "7. Select the related word.\n\nPsychology : Human Being :: Ornithology : ?\n\n(A) Volcanoes\n(B) Birds\n(C) Insects\n(D) Reptiles",
answer: "B",
explanation: "Psychology studies human beings. Ornithology studies birds."
},

{
q: "8. Select the related letters.\n\nEGIK : FHJL :: MOQS : ?\n\n(A) NPRT\n(B) LNOQ\n(C) KMOQ\n(D) NRPT",
answer: "A",
explanation: "Each letter increases by +1."
},

{
q: "9. Select the related numbers.\n\n147 : 741 :: 869 : ?\n\n(A) 968\n(B) 896\n(C) 689\n(D) 986",
answer: "A",
explanation: "Just reverse the digits: 869 → 968."
},

{
q: "10. Select the missing number.\n8   32   4\n7   ?    5\n2   6    3",
answer: "A",
explanation: "Pattern: middle number = left × right (7×5 = 35)."
},

{
q: "11. Ramesh starts his journey by walking 2 km towards North. Then he takes a right turn and walks 1 km. Again takes a right turn and walks 2 km. Now which direction is he facing?\n\n(A) West\n(B) South\n(C) East\n(D) North",
answer: "B",
explanation: "North → East → South."
},

{
q: "12. Which figure represents the relationship: Birds, Parrots, Bats?",
answer: "C",
explanation: "Parrots inside Birds; Bats separate."
},

{
q: "13. Complete the letter series:\n\nsr_tr_srs_r_srst",
answer: "A",
explanation: "Repeating pattern: s, r, t."
},

{
q: "14. Find the missing number in the series:\n\n43, 172, 86, 344, ?",
answer: "B",
explanation: "Pattern: ×4, ÷2 → next is 172."
},

{
q: "15. Select the word which cannot be formed from the letters of \"CHRONOLOGICAL\".\n\n(A) LOGIC\n(B) CALL\n(C) CALICO\n(D) ANALOGY",
answer: "D",
explanation: "The letter Y is not present in CHRONOLOGICAL."
}
];

const quizDiv = document.getElementById("quiz");
let totalTime = questions.length * 60;

// Render only questions
questions.forEach((item, index) => {
    let html = `<div class='question'>
        <p><b>${item.q}</b></p>
        <label><input type='radio' name='q${index}' value='A'> A</label><br>
        <label><input type='radio' name='q${index}' value='B'> B</label><br>
        <label><input type='radio' name='q${index}' value='C'> C</label><br>
        <label><input type='radio' name='q${index}' value='D'> D</label><br>
        <div id='result${index}' class='result'></div>
    </div>`;
    quizDiv.innerHTML += html;
});

// Timer display
const timerDiv = document.getElementById("timer");

function updateTimer() {
    let minutes = Math.floor(totalTime / 60);
    let seconds = totalTime % 60;
    timerDiv.textContent = `Time Left: ${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;

    if (totalTime <= 0) {
        submitTest();
        return;
    }
    totalTime--;
}

setInterval(updateTimer, 1000);

// Submit test and show answers
function submitTest() {
    let score = 0;
    let answerHTML = "<h3>Answers & Explanation</h3>";

    questions.forEach((item, index) => {
        let selected = document.querySelector(`input[name='q${index}']:checked`);
        let result = document.getElementById(`result${index}`);
        let userAnswer = selected ? selected.value : "Not Attempted";

        if (selected && selected.value === item.answer) {
            score++;
            result.textContent = "✔ Correct";
            result.style.color = "green";
        } else {
            result.textContent = "✖ Wrong";
            result.style.color = "red";
        }

        answerHTML += `
        <p><b>Q${index + 1}:</b> ${item.q}<br>
        Your Answer: ${userAnswer}<br>
        Correct Answer: ${item.answer}<br>
        Explanation: ${item.explanation}</p>
        `;
    });

    document.getElementById("score").innerHTML =
        `<h3>Score: ${score} / ${questions.length}</h3>`;

    document.getElementById("answers").innerHTML = answerHTML;
}

</script>

</body>
</html>
