<!DOCTYPE html>
<html>
<head>
<title>Unit 1 Test - Outbreak of World War I and Its Aftermath</title>
<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
}
.question {
    margin-bottom: 20px;
}
.timer {
    font-size: 20px;
    font-weight: bold;
    color: red;
}
button {
    padding: 10px 15px;
    margin-top: 10px;
}
.answerResult {
    margin-top: 10px;
    padding: 10px;
    background: #f9f9f9;
    border-left: 4px solid #007bff;
}
</style>
</head>
<body>

<h2>UNIT 1 – OUTBREAK OF WORLD WAR I AND ITS AFTERMATH</h2>
<div class="timer">Time Left: <span id="time"></span> seconds</div>

<form id="quizForm"></form>

<button type="button" onclick="submitQuiz()">Submit</button>

<h3 id="result"></h3>

<script>

const questions = [

{
question: `1. Consider the following statements regarding the aftermath of WWI:<br>
1. The three major empires that shattered after the war were the German, Austro-Hungarian, and Ottoman Empires.<br>
2. Russia was expelled from the League of Nations for its attack on Finland.<br>
3. The "Sick Man of Europe" was a term used to describe the German Empire.<br>
Which of the statements given above are CORRECT?`,
options: [
"1 and 2 only",
"2 and 3 only",
"1 and 3 only",
"1, 2, and 3"
],
answer: 0,
note: "The Ottoman Empire was known as the 'Sick Man of Europe', not the German Empire."
},

{
question: `2. Which of the following statements regarding the Rise of Japan is INCORRECT?`,
options: [
"Japan forced a war on China in the year 1894.",
"The Anglo-Japanese Alliance was signed in 1902.",
"The Russo-Japanese War (1904-05) made Japan a Great Power.",
"Japan was the last country to resign from the League of Nations."
],
answer: 3,
note: "Japan was actually the FIRST to resign from the League of Nations (1933)."
},

{
question: `3. Match the Treaties/Events (List I) with the participating Nations/Locations (List II):<br>
i. Treaty of Brest-Litovsk - a. Albania created<br>
ii. Treaty of London (1913) - b. Russia and Germany<br>
iii. Hall of Mirrors - c. Turkey<br>
iv. Treaty of Sevres - d. Versailles`,
options: [
"i-b, ii-a, iii-d, iv-c",
"i-a, ii-b, iii-c, iv-d",
"i-b, ii-d, iii-a, iv-c",
"i-c, ii-a, iii-d, iv-b"
],
answer: 0
},

{
question: `4. Match the Military Terms/Leaders (List I) with their specific details (List II):<br>
i. Battle of Marne - a. Turkey<br>
ii. Kemal Pasha - b. Trench Warfare<br>
iii. Emden - c. England<br>
iv. Jingoism - d. Bombarded Madras`,
options: [
"i-b, ii-a, iii-d, iv-c",
"i-a, ii-b, iii-c, iv-d",
"i-b, ii-c, iii-a, iv-d",
"i-d, ii-a, iii-b, iv-c"
],
answer: 0
},

{
question: `5. "Imperialism is the highest stage of capitalism"—who famously made this observation?`,
options: [
"Karl Marx",
"Sun Yat-Sen",
"Vladimir Lenin",
"Joseph Stalin"
],
answer: 2
},

{
question: `6. Who provided the famous revolutionary slogan "Bread, Peace, and Land"?`,
options: [
"Leon Trotsky",
"Vladimir Lenin",
"Georges Clemenceau",
"Woodrow Wilson"
],
answer: 1
},

{
question: `7. Who represented France as the Prime Minister during the Paris Peace Conference of 1919?`,
options: [
"David Lloyd George",
"Vittorio Orlando",
"Georges Clemenceau",
"Winston Churchill"
],
answer: 2
},

{
question: `8. Assertion (A): The first European attempts to carve out colonies in Africa resulted in bloody battles.<br>
Reason (R): There was stiff resistance from the native population.`,
options: [
"Both A and R are correct and R is the correct explanation of A.",
"Both A and R are correct but R is NOT the correct explanation of A.",
"A is correct but R is wrong.",
"A is wrong but R is correct."
],
answer: 0
},

{
question: `9. Assertion (A): In the Battle of Tannenberg, Russia suffered heavy losses.<br>
Reason (R): Russia was ill-equipped and failed to coordinate its armies against the German forces.`,
options: [
"Both A and R are correct and R is the correct explanation of A.",
"Both A and R are correct but R is NOT the correct explanation of A.",
"A is correct but R is wrong.",
"A is wrong but R is correct."
],
answer: 0
},

{
question: `10. Arrange the following Treaties in the correct Chronological Order (First to Last):<br>
1. Locarno Treaty<br>
2. Triple Alliance<br>
3. Anglo-Japanese Alliance<br>
4. Treaty of Versailles`,
options: [
"2 — 3 — 4 — 1",
"1 — 2 — 3 — 4",
"3 — 2 — 1 — 4",
"2 — 1 — 3 — 4"
],
answer: 0
}

];

let form = document.getElementById("quizForm");
let resultBox = document.getElementById("result");
let timerDisplay = document.getElementById("time");

let timerInterval;
let totalTime = questions.length * 10; 
let timeLeft = totalTime;

window.onload = function() {
    loadQuestions();
    startTimer();
};

function loadQuestions(){
    form.innerHTML = "";
    questions.forEach((q, index) => {
        let div = document.createElement("div");
        div.classList.add("question");
        div.innerHTML = `<p>${q.question}</p>`;
        q.options.forEach((option, i) => {
            div.innerHTML += `
            <label>
                <input type="radio" name="q${index}" value="${i}">
                ${option}
            </label><br>`;
        });
        form.appendChild(div);
    });
}

function startTimer(){
    timerDisplay.innerText = timeLeft;
    timerInterval = setInterval(()=>{
        timeLeft--;
        timerDisplay.innerText = timeLeft;
        if(timeLeft <= 0){
            clearInterval(timerInterval);
            submitQuiz();
        }
    },1000);
}

function submitQuiz(){

    clearInterval(timerInterval);

    let score = 0;
    let correctCount = 0;
    let wrongCount = 0;
    let notAnsweredCount = 0;

    questions.forEach((q, index) => {

        let selected = document.querySelector(`input[name="q${index}"]:checked`);
        let selectedValue = selected ? parseInt(selected.value) : null;

        let questionDiv = document.getElementsByClassName("question")[index];
        let oldResult = questionDiv.querySelector(".answerResult");
        if(oldResult) oldResult.remove();

        let resultText = document.createElement("div");
        resultText.classList.add("answerResult");

        if(selectedValue === null){
            notAnsweredCount++;
            resultText.innerHTML = `
                <p style="color:orange;"><b>Not Answered</b></p>
                <p><b>Correct Answer:</b> ${q.options[q.answer]}</p>
                ${q.note ? `<p style="color:blue;"><b>Note for Revision:</b> ${q.note}</p>` : ""}
            `;
        }
        else if(selectedValue === q.answer){
            score += 1;
            correctCount++;
            resultText.innerHTML = `
                <p style="color:green;"><b>✔ Correct (+1)</b></p>
                ${q.note ? `<p style="color:blue;"><b>Note for Revision:</b> ${q.note}</p>` : ""}
            `;
        }
        else{
            score -= 0.25;
            wrongCount++;
            resultText.innerHTML = `
                <p style="color:red;"><b>✘ Wrong (-0.25)</b></p>
                <p><b>Correct Answer:</b> ${q.options[q.answer]}</p>
                ${q.note ? `<p style="color:blue;"><b>Note for Revision:</b> ${q.note}</p>` : ""}
            `;
        }

        questionDiv.appendChild(resultText);
    });

    score = score.toFixed(2);

    resultBox.innerHTML = `
        <div style="background:#f0f0f0; padding:15px; margin-bottom:20px;">
            <h3>Final Score: ${score} / ${questions.length}</h3>
            <p>✔ Correct: ${correctCount}</p>
            <p>✘ Wrong: ${wrongCount}</p>
            <p>⭕ Not Answered: ${notAnsweredCount}</p>
        </div>
    `;
}

</script>
</body>
</html>
